<style>
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;background:#0d0f0e;color:#f5f2ec}
body{font-family:'DM Sans',system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
a{text-decoration:none;color:inherit}
:root{--line:rgba(255,255,255,.08);--line2:rgba(201,168,76,.24);--gold:#c9a84c;--text:#f5f2ec;--muted:rgba(245,242,236,.62);--muted2:rgba(245,242,236,.36)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(8,9,9,.96),rgba(13,15,14,.94));position:relative;z-index:1200}
.nav-left,.nav-right{display:flex;align-items:center;gap:14px}.logo{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-weight:700;font-size:19px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(201,168,76,.15)}
.badge{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--line2);padding:7px 12px;border-radius:999px;color:var(--gold);background:rgba(201,168,76,.08)}
.nav-link{font-size:14px;color:var(--muted)}
.toolbar{display:flex;flex-wrap:wrap;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(13,15,14,.84);position:relative;z-index:1100}
.group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.group-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);margin-right:4px}
.pill{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:var(--muted);padding:9px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.18s}
.pill:hover{border-color:rgba(201,168,76,.32);color:var(--text)}.pill.active{background:rgba(201,168,76,.14);border-color:rgba(201,168,76,.45);color:var(--gold)}
.toolbar-spacer{width:1px;background:var(--line);margin:0 2px}
.intent-group{transition:.18s ease}
.intent-group.is-hidden{opacity:.45}
.intent-group.is-hidden .pill{pointer-events:none}
.toolbar-helper{padding:8px 22px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(10,12,11,.74);font-size:12px;color:var(--muted)}
.toolbar-helper strong{color:var(--text);font-weight:600}
.shell{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:0;flex:1;min-height:0}
.main{position:relative;min-height:0;background:#0c0f0d}#map{position:absolute;inset:0}
.map-topbar{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;pointer-events:none;z-index:900}.map-topbar>*{pointer-events:auto}
.stat-strip{display:inline-flex;align-items:stretch;overflow:hidden;background:rgba(12,15,13,.84);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 24px rgba(0,0,0,.2);flex:0 0 auto}
.stat{padding:8px 12px;border-right:1px solid var(--line);text-align:center}.stat:last-child{border-right:none}
.stat-value{font-family:'Playfair Display',serif;font-size:19px;line-height:1;color:var(--gold)}
.stat-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted2);margin-top:5px;white-space:nowrap}
.selection-card{width:248px;max-width:28vw;background:rgba(12,15,13,.86);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;padding:10px 11px;box-shadow:0 14px 30px rgba(0,0,0,.24);margin-left:auto;transition:.18s}
.selection-card.is-collapsed{width:188px;max-width:188px}.selection-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.selection-toggle{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(245,242,236,.75);border-radius:10px;padding:6px 8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}.selection-card.is-collapsed .selection-body{display:none}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px}
.selection-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin:0 0 3px;line-height:1.15}
.selection-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
.metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-bottom:8px}.metric-box{padding:8px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.metric-k{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px}.metric-v{font-size:17px;font-weight:700;line-height:1.05}
.detail-list{display:grid;grid-template-columns:1fr auto;row-gap:6px;column-gap:9px;font-size:11px}.detail-list .k{color:var(--muted)}.detail-list .v{font-family:'DM Mono',monospace;color:var(--text);font-weight:500;text-align:right}
.legend{position:absolute;left:16px;bottom:16px;background:rgba(12,15,13,.88);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;padding:14px 16px;min-width:220px;z-index:900}.legend-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px}.legend-scale{height:10px;border-radius:999px;overflow:hidden;display:grid;grid-template-columns:repeat(24,1fr);border:1px solid rgba(255,255,255,.06)}.legend-scale span{display:block;height:100%}.legend-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-top:7px}
.hover-tip{position:absolute;z-index:1300;pointer-events:none;background:rgba(12,15,13,.96);border:1px solid rgba(201,168,76,.22);backdrop-filter:blur(10px);border-radius:14px;padding:10px 12px;min-width:220px;box-shadow:0 18px 34px rgba(0,0,0,.32);display:none}.hover-tip-title{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:4px}.hover-tip-sub{font-size:12px;color:var(--muted);margin-bottom:8px}.hover-tip-grid{display:grid;grid-template-columns:1fr auto;gap:6px 10px;font-size:12px}.hover-tip-grid .k{color:var(--muted)}.hover-tip-grid .v{font-family:'DM Mono',monospace}
.sidebar{border-left:1px solid var(--line);background:linear-gradient(180deg,#121513,#0f1210);display:flex;flex-direction:column;min-height:0}.sidebar-head{padding:18px 18px 14px;border-bottom:1px solid var(--line)}.sidebar-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin:2px 0 4px}.sidebar-sub{font-size:14px;color:var(--muted)}.search-wrap{padding:14px 18px 8px;border-bottom:1px solid rgba(255,255,255,.04)}.search{width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);padding:13px 14px;color:var(--text);font-size:14px;outline:none}
.list{padding:10px 12px 18px;overflow:auto;min-height:0}.item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;padding:14px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);border-radius:18px;margin-bottom:10px;cursor:pointer;transition:.18s}.item:hover{border-color:rgba(201,168,76,.28);background:rgba(201,168,76,.06)}.item.active{border-color:rgba(201,168,76,.42);background:rgba(201,168,76,.09);box-shadow:inset 0 0 0 1px rgba(201,168,76,.12)}.item-title{font-size:15px;font-weight:700;margin-bottom:4px}.item-sub{font-size:13px;color:var(--muted);margin-bottom:10px}.mini-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.mini{padding:8px 6px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);text-align:center}.mini-k{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:5px}.mini-v{font-size:12px;font-weight:700}.rank-badge{font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;border-radius:999px;background:#7fd18d;color:#112113;align-self:flex-start;font-weight:700}

</style>

  rent:{title:'Rent Trend',subtitle:'Year-over-year and trailing 30-day rent movement by submarket.',legend:'Rent Trend Strength',score:m=>(m.rentYoY*.82)+(m.rent30d*9)+(m.activeListings/40),subline:(f,m)=>`${f.properties.borough} · ${m.rentYoY>=0?'+':''}${m.rentYoY.toFixed(1)}% YoY · ${m.rent30d>=0?'+':''}${m.rent30d.toFixed(1)}% 30d`,side:m=>[['Rent',`${m.rentYoY>=0?'+':''}${m.rentYoY.toFixed(1)}%`],['30d',`${m.rent30d>=0?'+':''}${m.rent30d.toFixed(1)}%`],['List',String(m.activeListings)],['$/SF',`$${m.avgAskPsf}`]]},

function getMetric(id){return METRICS[id]}
function currentIntentHoverRows(m){
  if(intentFocus === 'buying'){
    return [
      ['Sold (6 mo)', String(m.buyingStats.sold6mo)],
      ['Avg Sale Price', '$' + Math.round(m.buyingStats.avgSalePrice).toLocaleString()],
      ['Avg Sale / SF', '$' + m.buyingStats.avgSalePsf],
      ['Avg DOM', String(m.buyingStats.avgDom)],
      ['Units Sold', String(m.buyingStats.unitsSold)]
    ];
  }
  if(intentFocus === 'selling'){
    return [
      ['On Market', String(m.sellingStats.activeListings)],
      ['Avg Ask Price', '$' + Math.round(m.sellingStats.avgAskPrice).toLocaleString()],
      ['Avg Ask / SF', '$' + m.sellingStats.avgAskPsf],
      ['Avg DOM', String(m.sellingStats.avgDom)],
      ['New 30d', String(m.sellingStats.newListings30d)]
    ];
  }
  if(intentFocus === 'refinancing'){
    return [
      ['Avg Loan', '$' + Math.round(m.refinancingStats.avgLoanAmount).toLocaleString()],
      ['Avg Rate', m.refinancingStats.avgRate.toFixed(2) + '%'],
      ['Loan Count', String(m.refinancingStats.loanCount)],
      ['Top Lender', m.refinancingStats.topLender],
      ['Avg LTV', String(m.refinancingStats.avgLtv) + '%']
    ];
  }
  return [
    ['Renovation Leads', String(m.renovatingStats.renovationLeads)],
    ['Avg Cost', '$' + Math.round(m.renovatingStats.avgProjectCost).toLocaleString()],
    ['Cosmetic Share', String(m.renovatingStats.cosmeticShare) + '%'],
    ['Full Gut Share', String(m.renovatingStats.fullGutShare) + '%'],
    ['Timeline', String(m.renovatingStats.avgTimelineMonths) + ' mo']
  ];
}

function featureById(id){return GEOJSON.features.find(f=>f.properties.id===id)||GEOJSON.features[0]}
function rankedFeatures(query=''){const q=query.trim().toLowerCase();return [...GEOJSON.features].filter(f=>!q||f.properties.name.toLowerCase().includes(q)||f.properties.borough.toLowerCase().includes(q)).sort((a,b)=>signalMeta[signal].score(getMetric(b.properties.id))-signalMeta[signal].score(getMetric(a.properties.id)))}
function normalize(features){const scores=features.map(f=>signalMeta[signal].score(getMetric(f.properties.id)));const min=Math.min(...scores),max=Math.max(...scores);const n=new Map();features.forEach(f=>n.set(f.properties.id,max===min?0.65:(signalMeta[signal].score(getMetric(f.properties.id))-min)/(max-min)));return n}
function colorScale(t){t=Math.max(0,Math.min(1,t));const stops=[[0,[39,68,55]],[.3,[89,139,100]],[.58,[201,168,76]],[.8,[215,125,68]],[1,[180,80,68]]];for(let i=1;i<stops.length;i++){if(t<=stops[i][0]){const [t0,a]=stops[i-1],[t1,b]=stops[i],p=(t-t0)/(t1-t0);return `rgb(${Math.round(a[0]+(b[0]-a[0])*p)},${Math.round(a[1]+(b[1]-a[1])*p)},${Math.round(a[2]+(b[2]-a[2])*p)})`}}return 'rgb(180,80,68)'}
function styleFor(feature, normalized){const id=feature.properties.id, hovered=id===hoveredSubmarket; return {fillColor:'#7bc0ff',fillOpacity:hovered?0.18:0.01,color:hovered?'#4f88b4':'rgba(255,255,255,0.01)',weight:hovered?2.0:0.8}}
function getLayerById(id){let found=null;geoLayer.eachLayer(l=>{if(l.feature.properties.id===id) found=l});return found}
function refreshStyles(){const norm=normalize(rankedFeatures(''));geoLayer.eachLayer(l=>l.setStyle(styleFor(l.feature,norm)))}
function setHovered(id){hoveredSubmarket=id;refreshStyles()}
function renderLegend(){document.getElementById('legendTitle').textContent=signalMeta[signal].legend;document.getElementById('legendScale').innerHTML=Array.from({length:24},(_,i)=>`<span style="background:${colorScale(i/23)}"></span>`).join('')}
function renderToolbarState(){
  const helper = document.getElementById('toolbarHelper');
  const group = document.getElementById('intentGroup');
  const isIntent = signal === 'intent';
  group.classList.toggle('is-hidden', !isIntent);
  if(isIntent){
    helper.innerHTML = `<strong>Owner Intent View:</strong> choose an intent type to change the hover metrics and rankings for buying, selling, refinancing, or renovating.`;
  } else if(signal === 'rent'){
    helper.innerHTML = `<strong>Rent Trend View:</strong> hover any submarket to see rent growth and related market snapshot data.`;
  } else if(signal === 'activity'){
    helper.innerHTML = `<strong>Buyer Activity View:</strong> hover any submarket to see recent sale activity, pricing, and buyer depth.`;
  } else if(signal === 'value'){
    helper.innerHTML = `<strong>Value Trend View:</strong> hover any submarket to see value movement and pricing direction.`;
  } else {
    helper.innerHTML = `<strong>Listings View:</strong> hover any submarket to see current listings, asking prices, and days on market.`;
  }
}
function renderStats(){const items=rankedFeatures(''),ms=items.map(f=>getMetric(f.properties.id));let cards=[];if(signal==='rent'){const inc=ms.filter(m=>m.rentYoY>0).length,avgY=ms.reduce((s,m)=>s+m.rentYoY,0)/ms.length,avg30=ms.reduce((s,m)=>s+m.rent30d,0)/ms.length;cards=[[String(inc),'Increasing'],[`${avgY>=0?'+':''}${avgY.toFixed(1)}%`,'Avg YoY'],[`${avg30>=0?'+':''}${avg30.toFixed(1)}%`,'Avg 30 Day'],[items[0].properties.name,'Top Market']]} else if(signal==='activity'){const tx=ms.reduce((s,m)=>s+m.transactions,0),avg=Math.round(ms.reduce((s,m)=>s+m.avgPsf,0)/ms.length),buyers=ms.reduce((s,m)=>s+m.buyers,0),units=ms.reduce((s,m)=>s+m.unitsSold,0);cards=[[String(tx),'Transactions'],[`$${avg}`,'Avg Price / SF'],[String(buyers),'Different Buyers'],[String(units),'Units Sold']]} else if(signal==='value'){const inc=ms.filter(m=>m.valueYoY>0).length,avgY=ms.reduce((s,m)=>s+m.valueYoY,0)/ms.length,avg30=ms.reduce((s,m)=>s+m.value30d,0)/ms.length;cards=[[String(inc),'Increasing'],[`+${avgY.toFixed(1)}%`,'Avg YoY'],[`+${avg30.toFixed(1)}%`,'Avg 30 Day'],[items[0].properties.name,'Top Market']]} else if(signal==='intent'){const total=ms.reduce((s,m)=>s+m.intent[intentFocus],0),avg=total/ms.length,top=items[0],concentration=total?(getMetric(top.properties.id).intent[intentFocus]/total)*100:0;cards=[[String(total),`${intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1)} Signals`],[top.properties.name,'Top Submarket'],[avg.toFixed(1),'Avg / Market'],[`${concentration.toFixed(0)}%`,'Top Share']]} else {const total=ms.reduce((s,m)=>s+m.activeListings,0),avgP=ms.reduce((s,m)=>s+m.avgAskM,0)/ms.length,avgPsf=Math.round(ms.reduce((s,m)=>s+m.avgAskPsf,0)/ms.length),avgDom=Math.round(ms.reduce((s,m)=>s+m.avgDom,0)/ms.length);cards=[[String(total),'Active Listings'],[`$${avgP.toFixed(2)}M`,'Avg Ask'],[`$${avgPsf}`,'Avg Ask / SF'],[String(avgDom),'Avg DOM']]}document.getElementById('statStrip').innerHTML=cards.map(([v,l])=>`<div class="stat"><div class="stat-value">${v}</div><div class="stat-label">${l}</div></div>`).join('')}
function bindCardToggle(card){
  if(!card) return;
  const toggle = card.querySelector('.selection-toggle');
  if(toggle){
    toggle.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      card.classList.toggle('is-collapsed');
      toggle.textContent = card.classList.contains('is-collapsed') ? 'Expand' : 'Collapse';
    };
  }
}
function renderSelected(){const card=document.getElementById('selectionCard'),sheet=document.getElementById('bottomSheet'); if(!selectedSubmarket){const empty=`<div class="selection-head"><div><div class="eyebrow">Selected Market</div><h3 class="selection-title">Click a submarket</h3><div class="selection-sub">Hover to preview an area. Click any submarket to load details for the current market view.</div></div><button class="selection-toggle" type="button">Collapse</button></div>`; card.innerHTML=empty; sheet.innerHTML=`<div class="eyebrow">Selected Market</div><h3 class="selection-title">Tap a submarket</h3><div class="selection-sub">Tap any neighborhood area to open details for the current market view.</div>`; bindCardToggle(card); return}
const f=featureById(selectedSubmarket),m=getMetric(selectedSubmarket);
const primary=signal==='listings'?[['Active Listings',`${m.activeListings}`],['Avg Ask Price',`$${m.avgAskM.toFixed(2)}M`],['Avg Ask / SF',`$${m.avgAskPsf}`],['Avg DOM',`${m.avgDom}`]]:signal==='activity'?[['Transactions',`${m.transactions}`],['Avg Price / SF',`$${m.avgPsf}`],['Different Buyers',`${m.buyers}`],['Units Sold',`${m.unitsSold}`]]:signal==='value'?[['Value YoY',`${m.valueYoY>=0?'+':''}${m.valueYoY.toFixed(1)}%`],['30 Day Value',`${m.value30d>=0?'+':''}${m.value30d.toFixed(1)}%`],['Avg Ask Price',`$${m.avgAskM.toFixed(2)}M`],['Avg Ask / Unit',`$${Math.round(m.avgAskUnit).toLocaleString()}`]]:signal==='intent'?[[`${intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1)}`,`${m.intent[intentFocus]}`],['Buying / Selling',`${m.intent.buying} / ${m.intent.selling}`],['Refi / Reno',`${m.intent.refinancing} / ${m.intent.renovating}`],['Listings',`${m.activeListings}`]]:[['Rent YoY',`${m.rentYoY>=0?'+':''}${m.rentYoY.toFixed(1)}%`],['30 Day Rent',`${m.rent30d>=0?'+':''}${m.rent30d.toFixed(1)}%`],['Active Listings',`${m.activeListings}`],['Avg Ask / SF',`$${m.avgAskPsf}`]];
const details=[['Total Sales Volume',`$${m.volumeM}M`],['Different Buyers',`${m.buyers}`],['Units Sold',`${m.unitsSold}`],['Average Closed $ / SF',`$${m.avgPsf}`],['Active Listings',`${m.activeListings}`],['Average Ask Price',`$${m.avgAskM.toFixed(2)}M`],['Average Ask / SF',`$${m.avgAskPsf}`],['Average Ask / Unit',`$${Math.round(m.avgAskUnit).toLocaleString()}`],['Average DOM',`${m.avgDom}`]];
const markup=`<div class="selection-head"><div><div class="eyebrow">Selected Market</div><h3 class="selection-title">${f.properties.name}</h3><div class="selection-sub">${f.properties.borough} · ${signalMeta[signal].title}${signal==='intent' ? ` · ${intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1)}` : ''}</div></div><button class="selection-toggle" type="button">Collapse</button></div><div class="selection-body"><div class="metric-grid">${primary.map(([k,v])=>`<div class="metric-box"><div class="metric-k">${k}</div><div class="metric-v">${v}</div></div>`).join('')}</div><div class="detail-list">${details.map(([k,v])=>`<div class="k">${k}</div><div class="v">${v}</div>`).join('')}</div></div>`;
card.innerHTML=markup; sheet.innerHTML=markup; bindCardToggle(card)}
function renderList(){const q=document.getElementById('searchInput').value||'',items=rankedFeatures(q),normalized=normalize(rankedFeatures(''));document.getElementById('sidebarTitle').textContent=signalMeta[signal].title;document.getElementById('sidebarSub').textContent=signalMeta[signal].subtitle;document.getElementById('rankingList').innerHTML=items.map(f=>{const m=getMetric(f.properties.id),side=signalMeta[signal].side(m);return `<div class="item ${selectedSubmarket&&f.properties.id===selectedSubmarket?'active':''}" data-id="${f.properties.id}"><div><div class="item-title">${f.properties.name}</div><div class="item-sub">${signalMeta[signal].subline(f,m)}</div><div class="mini-grid">${side.map(([k,v])=>`<div class="mini"><div class="mini-k">${k}</div><div class="mini-v">${v}</div></div>`).join('')}</div></div><div class="rank-badge">${Math.round((normalized.get(f.properties.id)??.5)*100)}</div></div>`}).join('');document.querySelectorAll('.item').forEach(el=>{el.onmouseenter=()=>setHovered(el.dataset.id);el.onmouseleave=()=>setHovered(null);el.onclick=()=>selectSubmarket(el.dataset.id,true)})}
function showHoverTip(e,feature){
  if(window.innerWidth<=680) return;
  const tip=document.getElementById('hoverTip'), m=getMetric(feature.properties.id);
  let rows;
  if(signal === 'intent'){
    rows = currentIntentHoverRows(m);
  } else if(signal === 'rent'){
    rows = [['Rent YoY', `${m.rentYoY>=0?'+':''}${m.rentYoY.toFixed(1)}%`], ['30 Day Rent', `${m.rent30d>=0?'+':''}${m.rent30d.toFixed(1)}%`], ['Sold (6 mo)', String(m.buyingStats.sold6mo)], ['Avg Sale / SF', '$' + m.buyingStats.avgSalePsf], ['Avg DOM', String(m.buyingStats.avgDom)]];
  } else if(signal === 'activity'){
    rows = [['Transactions', String(m.transactions)], ['Different Buyers', String(m.buyers)], ['Volume', '$' + m.volumeM + 'M'], ['Units Sold', String(m.unitsSold)], ['Avg $ / SF', '$' + m.avgPsf]];
  } else if(signal === 'value'){
    rows = [['Value YoY', `${m.valueYoY>=0?'+':''}${m.valueYoY.toFixed(1)}%`], ['30 Day Value', `${m.value30d>=0?'+':''}${m.value30d.toFixed(1)}%`], ['Avg Ask Price', '$' + Math.round(m.sellingStats.avgAskPrice).toLocaleString()], ['Avg Ask / SF', '$' + m.sellingStats.avgAskPsf], ['Avg DOM', String(m.sellingStats.avgDom)]];
  } else {
    rows = [['On Market', String(m.sellingStats.activeListings)], ['Avg Ask Price', '$' + Math.round(m.sellingStats.avgAskPrice).toLocaleString()], ['Avg Ask / SF', '$' + m.sellingStats.avgAskPsf], ['Avg DOM', String(m.sellingStats.avgDom)], ['New 30d', String(m.sellingStats.newListings30d)]];
  }
  tip.innerHTML = `<div class="hover-tip-title">${feature.properties.name}</div><div class="hover-tip-sub">${signalMeta[signal].subline(feature,m)}</div><div class="hover-tip-grid">${rows.map(([k,v])=>`<div class="k">${k}</div><div class="v">${v}</div>`).join('')}</div>`;
  tip.style.display='block';
  moveHoverTip(e);
}
function moveHoverTip(e){const tip=document.getElementById('hoverTip'); if(window.innerWidth<=680||tip.style.display==='none') return; const rect=document.getElementById('map').getBoundingClientRect(), tipRect=tip.getBoundingClientRect(); let x=e.originalEvent.clientX-rect.left+16, y=e.originalEvent.clientY-rect.top+16; if(x+tipRect.width>rect.width-12) x=rect.width-tipRect.width-12; if(y+tipRect.height>rect.height-12) y=rect.height-tipRect.height-12; tip.style.left=x+'px'; tip.style.top=y+'px'}
function hideHoverTip(){document.getElementById('hoverTip').style.display='none'}
function renderAll(){renderToolbarState();renderLegend();renderStats();renderSelected();refreshStyles();renderList()}
function selectSubmarket(id,fit){selectedSubmarket=id; renderAll(); if(fit){const l=getLayerById(id); if(l) map.fitBounds(l.getBounds().pad(window.innerWidth>680?0.40:0.16), {animate:true,duration:0.35,padding:[16,16]})}}
function initMap(){map=L.map('map',{zoomControl:true,attributionControl:true,center:[40.735,-73.965],zoom:11,minZoom:10,maxZoom:14,scrollWheelZoom:true,preferCanvas:true}); const bounds=L.latLngBounds([[40.54,-74.08],[40.90,-73.88]]); map.setMaxBounds(bounds.pad(.18)); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map); geoLayer=L.geoJSON(GEOJSON,{style:f=>styleFor(f,normalize(rankedFeatures(''))), onEachFeature:(feature,layer)=>{layer.on('mouseover',e=>{setHovered(feature.properties.id);showHoverTip(e,feature)});layer.on('mousemove',e=>moveHoverTip(e));layer.on('mouseout',()=>{setHovered(null);hideHoverTip()});layer.on('click',()=>selectSubmarket(feature.properties.id,false))}}).addTo(map); const cityBounds=L.latLngBounds([[40.60,-74.05],[40.86,-73.90]]); map.fitBounds(cityBounds,{animate:false}); renderAll()}
document.querySelectorAll('.signal-pill').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.signal-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');signal=btn.dataset.signal;renderAll()}))
document.querySelectorAll('.intent-pill').forEach(btn=>btn.addEventListener('click',()=>{
  if(signal !== 'intent') return;
  document.querySelectorAll('.intent-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  intentFocus=btn.dataset.intent;
  renderAll();
}))
document.getElementById('searchInput').addEventListener('input',renderList)
initMap()
</script>
