<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;margin:0;padding:0;background:#0d0f0e}
body{font-family:'DM Sans',sans-serif;color:#f5f2ec;font-size:14px;line-height:1.5;display:flex;flex-direction:column}

nav{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(13,15,14,0.95);flex-shrink:0}
.nav-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;color:#f5f2ec;text-decoration:none;display:flex;align-items:center;gap:0.5rem}
.nav-dot{width:7px;height:7px;background:#c9a84c;border-radius:50%}
.nav-badge{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:#c9a84c;border:1px solid rgba(201,168,76,0.3);padding:0.3rem 0.8rem;border-radius:20px}
.nav-back{font-size:0.78rem;color:rgba(255,255,255,0.4);text-decoration:none}
.nav-back:hover{color:#c9a84c}

.toolbar{display:flex;align-items:center;gap:0.6rem;padding:0.8rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(13,15,14,0.7);flex-wrap:wrap;flex-shrink:0}
.tlabel{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.btn{padding:0.4rem 0.85rem;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.55);font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn:hover{border-color:rgba(201,168,76,0.3);color:#f5f2ec}
.btn.active{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.45);color:#c9a84c}
select{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#f5f2ec;font-family:'DM Sans',sans-serif;font-size:0.8rem;padding:0.4rem 0.8rem;border-radius:20px;outline:none;cursor:pointer}
select option{background:#0d0f0e}
.tdiv{width:1px;height:18px;background:rgba(255,255,255,0.08)}

.main{display:flex;flex:1;overflow:hidden;min-height:0}
.map-wrap{flex:1;position:relative;background:linear-gradient(145deg,#0a0f0c,#0f1311);overflow:hidden}
#mapSvg{width:100%;height:100%;display:block}

.n-cell{cursor:pointer;transition:opacity 0.2s}
.n-cell:hover{opacity:0.95}
.n-label-text{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;fill:#fff;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:rgba(0,0,0,0.8);stroke-width:3;stroke-linejoin:round}
.n-label-val{font-family:'DM Mono',monospace;font-size:9px;fill:#e8d08a;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:rgba(0,0,0,0.8);stroke-width:2.5;stroke-linejoin:round}

#tooltip{position:absolute;pointer-events:none;z-index:100;background:rgba(13,15,14,0.97);border:1px solid rgba(201,168,76,0.35);border-radius:10px;padding:0.9rem 1.1rem;min-width:220px;opacity:0;transition:opacity 0.15s;box-shadow:0 12px 32px rgba(0,0,0,0.5);font-size:0.8rem}
.tt-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#f5f2ec;margin-bottom:0.6rem;padding-bottom:0.45rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.tt-row{display:flex;justify-content:space-between;padding:0.25rem 0;font-size:0.75rem}
.tt-label{color:rgba(255,255,255,0.45)}
.tt-val{font-family:'DM Mono',monospace;color:#f5f2ec;font-weight:500}
.tt-val.hot{color:#e8a050}
.tt-val.warm{color:#e8d08a}
.tt-val.cool{color:#6dba8f}

.legend{position:absolute;bottom:1.25rem;left:1.25rem;background:rgba(13,15,14,0.9);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:0.85rem 1.1rem;min-width:200px;z-index:10}
.legend-title{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.13em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:0.65rem}
.legend-scale{display:flex;height:8px;border-radius:5px;overflow:hidden;margin-bottom:0.4rem}
.legend-labels{display:flex;justify-content:space-between;margin-top:0.35rem;font-family:'DM Mono',monospace;font-size:0.55rem;color:rgba(255,255,255,0.3);letter-spacing:0.04em}

.stats{position:absolute;top:1rem;left:50%;transform:translateX(-50%);display:flex;background:rgba(13,15,14,0.9);border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;z-index:10}
.stat{padding:0.6rem 1.15rem;border-right:1px solid rgba(255,255,255,0.07);text-align:center}
.stat:last-child{border-right:none}
.stat-v{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#e8d08a;line-height:1;white-space:nowrap}
.stat-l{font-family:'DM Mono',monospace;font-size:0.53rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:0.3rem;white-space:nowrap}

.side{width:300px;border-left:1px solid rgba(255,255,255,0.07);overflow-y:auto;background:rgba(13,15,14,0.6);flex-shrink:0}
.side::-webkit-scrollbar{width:3px}
.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

.side-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:#f5f2ec}

.nlist{padding:0.6rem 0.6rem 1rem}
.nitem{padding:0.75rem 0.9rem;margin-bottom:0.3rem;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:0.75rem;background:rgba(255,255,255,0.02);border:1px solid transparent;transition:all 0.15s}
.nitem:hover{background:rgba(255,255,255,0.05)}
.nitem.active{background:rgba(201,168,76,0.13);border-color:rgba(201,168,76,0.3)}

.ninfo{flex:1;min-width:0}
.nname{font-size:0.82rem;font-weight:600;color:#f5f2ec;margin-bottom:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nsub{font-family:'DM Mono',monospace;font-size:0.62rem;color:rgba(255,255,255,0.4)}
.nbadge{font-family:'DM Mono',monospace;font-size:0.6rem;padding:0.2rem 0.5rem;border-radius:5px;white-space:nowrap;flex-shrink:0;font-weight:500}

@media(max-width:900px){.side{display:none}.stats{font-size:0.7rem}.stat{padding:0.5rem 0.8rem}}
</style>

      {id:'wood',name:'Woodlawn',cx:620,cy:615,w:115,h:80,rent:8.9,activity:90,value:83,intent:89,avgRent:2100,capRate:6.3,units:3400}
    ]
  }
};

var currentCity = 'nyc';
var currentMetric = 'rent';
var activeN = null;

var METRIC_LABELS = {
  rent: 'Rent Growth (YoY %)',
  activity: 'Buyer Activity (0-100)',
  value: 'Value Trend (0-100)',
  intent: 'Owner Intent (0-100)'
};

function heatColor(score) {
  var s = Math.max(0, Math.min(10, score));
  var stops = [
    [0, [26, 42, 30]],
    [3, [35, 92, 56]],
    [5.5, [201, 168, 76]],
    [7.5, [201, 96, 48]],
    [10, [158, 26, 12]]
  ];
  for (var i = 1; i < stops.length; i++) {
    if (s <= stops[i][0]) {
      var t = (s - stops[i-1][0]) / (stops[i][0] - stops[i-1][0]);
      var a = stops[i-1][1], b = stops[i][1];
      var r = Math.round(a[0] + (b[0]-a[0])*t);
      var g = Math.round(a[1] + (b[1]-a[1])*t);
      var bv = Math.round(a[2] + (b[2]-a[2])*t);
      return 'rgb(' + r + ',' + g + ',' + bv + ')';
    }
  }
  return 'rgb(158,26,12)';
}

function getScore(n) {
  if (currentMetric === 'rent') return Math.min(10, n.rent);
  return n[currentMetric] / 10;
}

function getDisplay(n) {
  if (currentMetric === 'rent') return '+' + n.rent.toFixed(1) + '%';
  return String(n[currentMetric]);
}

function buildLegend() {
  var scale = document.getElementById('legendScale');
  document.getElementById('legendTitle').textContent = METRIC_LABELS[currentMetric];
  var html = '';
  for (var i = 0; i <= 20; i++) {
    html += '<div style="flex:1;background:' + heatColor(i/2) + '"></div>';
  }
  scale.innerHTML = html;
}

function buildMap() {
  var svg = document.getElementById('mapSvg');
  var city = CITIES[currentCity];
  var ns = city.neighborhoods;
  var parts = ['<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/></pattern></defs>'];
  parts.push('<rect width="1000" height="700" fill="url(#grid)"/>');

  for (var i = 0; i < ns.length; i++) {
    var n = ns[i];
    var score = getScore(n);
    var color = heatColor(score);
    var x = n.cx - n.w/2;
    var y = n.cy - n.h/2;
    var isActive = activeN === n.id;
    var stroke = isActive ? '#fff' : 'rgba(255,255,255,0.2)';
    var strokeW = isActive ? 2 : 1;
    parts.push('<rect class="n-cell" data-id="' + n.id + '" x="' + x + '" y="' + y + '" width="' + n.w + '" height="' + n.h + '" rx="10" fill="' + color + '" fill-opacity="0.78" stroke="' + stroke + '" stroke-width="' + strokeW + '"/>');
    parts.push('<text class="n-label-text" x="' + n.cx + '" y="' + (n.cy - 2) + '">' + n.name + '</text>');
    parts.push('<text class="n-label-val" x="' + n.cx + '" y="' + (n.cy + 14) + '">' + getDisplay(n) + '</text>');
  }
  svg.innerHTML = parts.join('');

  // Attach events to cells
  var cells = svg.querySelectorAll('.n-cell');
  for (var j = 0; j < cells.length; j++) {
    (function(cell) {
      var id = cell.getAttribute('data-id');
      var n = ns.filter(function(x){return x.id===id})[0];
      cell.addEventListener('mouseenter', function(e) { showTip(e, n); });
      cell.addEventListener('mousemove', function(e) { moveTip(e); });
      cell.addEventListener('mouseleave', hideTip);
      cell.addEventListener('click', function() { selectN(n); });
    })(cells[j]);
  }

  buildStats();
  buildList();
}

function showTip(e, n) {
  var tt = document.getElementById('tooltip');
  var score = getScore(n);
  var color = heatColor(score);
  var heat = score >= 7 ? 'hot' : score >= 5 ? 'warm' : 'cool';
  var heatLabel = score >= 8 ? 'Very Hot' : score >= 6 ? 'Hot' : score >= 4 ? 'Warm' : 'Cool';
  var html = '<div class="tt-name">' + n.name + '</div>';
  html += '<div class="tt-row"><span class="tt-label">' + METRIC_LABELS[currentMetric] + '</span><span class="tt-val ' + heat + '">' + getDisplay(n) + '</span></div>';
  html += '<div class="tt-row"><span class="tt-label">Avg Rent</span><span class="tt-val">$' + n.avgRent.toLocaleString() + '/mo</span></div>';
  html += '<div class="tt-row"><span class="tt-label">Cap Rate</span><span class="tt-val">' + n.capRate + '%</span></div>';
  html += '<div class="tt-row"><span class="tt-label">Units</span><span class="tt-val">' + n.units.toLocaleString() + '</span></div>';
  html += '<div class="tt-row"><span class="tt-label">Heat</span><span class="tt-val ' + heat + '">' + heatLabel + '</span></div>';
  tt.innerHTML = html;
  tt.style.opacity = '1';
  moveTip(e);
}

function moveTip(e) {
  var tt = document.getElementById('tooltip');
  var wrap = document.querySelector('.map-wrap');
  var rect = wrap.getBoundingClientRect();
  var x = e.clientX - rect.left + 14;
  var y = e.clientY - rect.top - 20;
  if (x + 260 > rect.width) x = e.clientX - rect.left - 260;
  if (y < 0) y = 10;
  if (y + 230 > rect.height) y = rect.height - 240;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTip() {
  document.getElementById('tooltip').style.opacity = '0';
}

function selectN(n) {
  activeN = n.id;
  buildMap();
}

function buildStats() {
  var ns = CITIES[currentCity].neighborhoods;
  var avgRent = 0, avgCap = 0, hot = 0, topN = ns[0];
  for (var i = 0; i < ns.length; i++) {
    avgRent += ns[i].avgRent;
    avgCap += ns[i].capRate;
    if (getScore(ns[i]) >= 7) hot++;
    if (ns[i][currentMetric] > topN[currentMetric]) topN = ns[i];
  }
  avgRent = Math.round(avgRent / ns.length);
  avgCap = (avgCap / ns.length).toFixed(1);
  var html = '';
  html += '<div class="stat"><div class="stat-v">' + ns.length + '</div><div class="stat-l">Neighborhoods</div></div>';
  html += '<div class="stat"><div class="stat-v">$' + avgRent.toLocaleString() + '</div><div class="stat-l">Avg Rent</div></div>';
  html += '<div class="stat"><div class="stat-v">' + avgCap + '%</div><div class="stat-l">Avg Cap</div></div>';
  html += '<div class="stat"><div class="stat-v">' + hot + '</div><div class="stat-l">Hot Markets</div></div>';
  html += '<div class="stat"><div class="stat-v">' + topN.name + '</div><div class="stat-l">#1 Signal</div></div>';
  document.getElementById('stats').innerHTML = html;
}

function buildList() {
  var ns = CITIES[currentCity].neighborhoods.slice();
  ns.sort(function(a,b){return b[currentMetric] - a[currentMetric]});
  document.getElementById('sideTitle').textContent = METRIC_LABELS[currentMetric];
  var html = '';
  for (var i = 0; i < ns.length; i++) {
    var n = ns[i];
    var score = getScore(n);
    var color = heatColor(score);
    var val = currentMetric === 'rent' ? ('+' + n.rent.toFixed(1) + '%') : String(n[currentMetric]);
    var heat = score >= 7 ? 'hot' : score >= 5 ? 'warm' : 'cool';
    var bgColors = {hot:'rgba(184,92,56,0.18)',warm:'rgba(201,168,76,0.15)',cool:'rgba(61,158,106,0.12)'};
    var tcolor = {hot:'#e8a050',warm:'#e8d08a',cool:'#6dba8f'};
    var activeCls = activeN === n.id ? ' active' : '';
    html += '<div class="nitem' + activeCls + '" data-id="' + n.id + '">';
    html += '<div class="ndot" style="background:' + color + '"></div>';
    html += '<div class="ninfo"><div class="nname">' + n.name + '</div><div class="nsub">$' + n.avgRent.toLocaleString() + '/mo · ' + n.capRate + '%</div></div>';
    html += '<div class="nbadge" style="background:' + bgColors[heat] + ';color:' + tcolor[heat] + '">' + val + '</div>';
    html += '</div>';
  }
  var list = document.getElementById('nlist');
  list.innerHTML = html;
  var items = list.querySelectorAll('.nitem');
  for (var k = 0; k < items.length; k++) {
    (function(item) {
      item.addEventListener('click', function() {
        var id = item.getAttribute('data-id');
        var found = CITIES[currentCity].neighborhoods.filter(function(x){return x.id===id})[0];
        if (found) selectN(found);
      });
    })(items[k]);
  }
}

// Event wiring
document.getElementById('citySel').addEventListener('change', function(e) {
  currentCity = e.target.value;
  activeN = null;
  buildMap();
});

var metricBtns = document.querySelectorAll('[data-m]');
for (var m = 0; m < metricBtns.length; m++) {
  metricBtns[m].addEventListener('click', function() {
    var metric = this.getAttribute('data-m');
    currentMetric = metric;
    for (var i = 0; i < metricBtns.length; i++) metricBtns[i].classList.remove('active');
    this.classList.add('active');
    buildMap();
    buildLegend();
  });
}

// Initial build
buildLegend();
buildMap();
</script>
