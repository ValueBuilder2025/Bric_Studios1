<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRIC Studios — NYC Heatmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;background:#0d0f0e;color:#f5f2ec}
body{font-family:'DM Sans',system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
a{text-decoration:none;color:inherit}
:root{
  --bg:#0d0f0e;
  --panel:#121513;
  --panel-2:#171b18;
  --line:rgba(255,255,255,.08);
  --line-2:rgba(201,168,76,.24);
  --gold:#c9a84c;
  --text:#f5f2ec;
  --muted:rgba(245,242,236,.62);
  --muted-2:rgba(245,242,236,.36);
}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(8,9,9,.96),rgba(13,15,14,.94));position:relative;z-index:1200}
.nav-left,.nav-right{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-weight:700;font-size:19px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(201,168,76,.15)}
.badge{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--line-2);padding:7px 12px;border-radius:999px;color:var(--gold);background:rgba(201,168,76,.08)}
.nav-link{font-size:14px;color:var(--muted);transition:.18s}
.nav-link:hover{color:var(--text)}
.toolbar{display:flex;flex-wrap:wrap;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(13,15,14,.84);position:relative;z-index:1100}
.group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.group-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-right:4px}
.pill{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:var(--muted);padding:9px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.18s}
.pill:hover{border-color:rgba(201,168,76,.32);color:var(--text)}
.pill.active{background:rgba(201,168,76,.14);border-color:rgba(201,168,76,.45);color:var(--gold)}
.toolbar-spacer{width:1px;background:var(--line);margin:0 2px}
.shell{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:0;flex:1;min-height:0}
.main{position:relative;min-height:0;background:#0c0f0d}
#map{position:absolute;inset:0}
.map-topbar{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;pointer-events:none;z-index:900}
.map-topbar > *{pointer-events:auto}
.stat-strip{display:inline-flex;align-items:stretch;overflow:hidden;background:rgba(12,15,13,.84);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 24px rgba(0,0,0,.2);width:auto;max-width:none;flex:0 0 auto}
.stat{min-width:0;padding:8px 12px;border-right:1px solid var(--line);text-align:center;flex:0 0 auto}
.stat:last-child{border-right:none}
.stat-value{font-family:'Playfair Display',serif;font-size:19px;line-height:1;color:var(--gold)}
.stat-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted-2);margin-top:5px;white-space:nowrap}
.selection-card{width:340px;max-width:42vw;background:rgba(12,15,13,.9);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:22px;padding:16px 18px;box-shadow:0 16px 42px rgba(0,0,0,.28);margin-left:auto}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-2);margin-bottom:4px}
.selection-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin:0 0 4px}
.selection-sub{font-size:13px;color:var(--muted);margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.metric-box{padding:12px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.metric-k{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px}
.metric-v{font-size:28px;font-weight:700;line-height:1.05}
.detail-list{display:grid;grid-template-columns:1fr auto;row-gap:9px;column-gap:14px;font-size:14px}
.detail-list .k{color:var(--muted)}
.detail-list .v{font-family:'DM Mono',monospace;color:var(--text);font-weight:500;text-align:right}
.intent-chip-row{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.intent-chip{padding:7px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.intent-chip.active{border-color:rgba(201,168,76,.42);background:rgba(201,168,76,.12);color:var(--gold)}
.intent-highlight{padding:12px;border-radius:14px;background:linear-gradient(180deg,rgba(201,168,76,.12),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.22);margin-bottom:12px}
.intent-highlight-k{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px}
.intent-highlight-v{font-size:30px;font-weight:700;line-height:1;color:var(--gold)}
.legend{position:absolute;left:16px;bottom:16px;background:rgba(12,15,13,.88);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;padding:14px 16px;min-width:220px;z-index:900}
.legend-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:10px}
.legend-scale{height:10px;border-radius:999px;overflow:hidden;display:grid;grid-template-columns:repeat(24,1fr);border:1px solid rgba(255,255,255,.06)}
.legend-scale span{display:block;height:100%}
.legend-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted-2);margin-top:7px}
.sidebar{border-left:1px solid var(--line);background:linear-gradient(180deg,#121513,#0f1210);display:flex;flex-direction:column;min-height:0}
.sidebar-head{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
.sidebar-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin:2px 0 4px}
.sidebar-sub{font-size:14px;color:var(--muted)}
.search-wrap{padding:14px 18px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.search{width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);padding:13px 14px;color:var(--text);font-size:14px;outline:none}
.search::placeholder{color:rgba(245,242,236,.34)}
.list{padding:10px 12px 18px;overflow:auto;min-height:0}
.item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;padding:14px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);border-radius:18px;margin-bottom:10px;cursor:pointer;transition:.18s}
.item:hover{border-color:rgba(201,168,76,.28);background:rgba(201,168,76,.06)}
.item.active{border-color:rgba(201,168,76,.42);background:rgba(201,168,76,.09);box-shadow:inset 0 0 0 1px rgba(201,168,76,.12)}
.item-title{font-size:15px;font-weight:700;margin-bottom:4px}
.item-sub{font-size:13px;color:var(--muted);margin-bottom:10px}
.mini-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.mini{padding:8px 6px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);text-align:center}
.mini-k{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:5px}
.mini-v{font-size:12px;font-weight:700}
.rank-badge{font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;border-radius:999px;background:#7fd18d;color:#112113;align-self:flex-start;font-weight:700}
.leaflet-container{background:#0b0d0c;font:inherit}
.leaflet-control-attribution{background:rgba(10,12,10,.72)!important;color:rgba(255,255,255,.45)!important;border-radius:8px 0 0 0;backdrop-filter:blur(8px)}
.leaflet-control-attribution a{color:rgba(255,255,255,.55)!important}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:rgba(16,19,17,.95);color:#f5f2ec;border:1px solid rgba(201,168,76,.2)}
.leaflet-popup-content{margin:12px 14px}
.map-popup-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:4px}
.map-popup-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.map-popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.map-popup-grid div{background:rgba(255,255,255,.03);padding:8px 10px;border-radius:10px}
.map-popup-grid b{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted-2);text-transform:uppercase;margin-bottom:4px}
.submarket-marker{background:transparent;border:none}
.marker-card{min-width:86px;transform:translate(-50%,-50%);padding:9px 10px;border-radius:14px;background:rgba(17,20,18,.92);border:1px solid rgba(255,255,255,.08);box-shadow:0 12px 28px rgba(0,0,0,.25);backdrop-filter:blur(8px);text-align:center;transition:.16s}
.marker-card.active{box-shadow:0 0 0 1px rgba(255,255,255,.25),0 14px 34px rgba(0,0,0,.35);transform:translate(-50%,-50%) scale(1.03)}
.marker-name{font-size:11px;font-weight:700;line-height:1.1;color:#fff;margin-bottom:5px;white-space:nowrap}
.marker-value{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;line-height:1}
.marker-meta{margin-top:5px;font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.55);letter-spacing:.05em;text-transform:uppercase}
.marker-pointer{width:10px;height:10px;position:absolute;left:50%;bottom:-6px;transform:translateX(-50%) rotate(45deg);border-right:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08)}
@media (max-width:980px){
  body{overflow:auto}
  .shell{grid-template-columns:1fr;min-height:auto}
  .main{display:flex;flex-direction:column;min-height:auto;background:#0c0f0d}
  #map{position:relative;inset:auto;height:56vh;min-height:430px}
  .map-topbar{position:static;left:auto;right:auto;top:auto;display:flex;flex-direction:column;align-items:stretch;gap:12px;padding:14px}
  .stat-strip{align-self:flex-start}
  .selection-card{width:100%;max-width:none;margin-left:0}
  .legend{position:static;left:auto;right:auto;bottom:auto;margin:0 14px 14px;min-width:0}
  .sidebar{border-left:none;border-top:1px solid var(--line);min-height:420px}
}

@media (max-width:680px){
  html,body{height:auto}
  body{overflow:auto}
  .nav{padding:12px 14px;gap:10px;flex-wrap:wrap}
  .nav-left,.nav-right{gap:10px;flex-wrap:wrap}
  .logo{font-size:17px}
  .badge{display:none}
  .nav-link{font-size:13px}
  .toolbar{padding:12px 14px;gap:12px;overflow-x:auto;flex-wrap:nowrap;align-items:flex-start}
  .toolbar-spacer{display:none}
  .group{display:flex;gap:8px;flex-wrap:nowrap;min-width:max-content;align-items:center}
  .group-label{width:auto;white-space:nowrap;margin-right:2px}
  .pill{padding:8px 12px;font-size:12px;white-space:nowrap}
  .main{display:flex;flex-direction:column}
  #map{height:50vh;min-height:360px}
  .map-topbar{padding:12px;gap:10px}
  .stat-strip{width:100%;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border-radius:14px;overflow:hidden}
  .stat{padding:10px 8px;min-width:0}
  .stat:nth-child(2n){border-right:none}
  .stat:nth-child(-n+2){border-bottom:1px solid var(--line)}
  .stat-value{font-size:18px}
  .stat-label{font-size:8px}
  .selection-card{padding:14px;border-radius:18px}
  .selection-title{font-size:17px}
  .selection-sub{font-size:12px}
  .intent-highlight-v{font-size:26px}
  .intent-chip-row{gap:6px}
  .intent-chip{font-size:9px;padding:6px 8px}
  .metric-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .metric-box{padding:10px}
  .metric-v{font-size:22px}
  .detail-list{font-size:13px;column-gap:10px;row-gap:8px}
  .legend{margin:0 12px 12px;padding:12px 14px}
  .legend-title,.legend-labels{font-size:9px}
  .sidebar-head{padding:14px}
  .sidebar-title{font-size:20px}
  .sidebar-sub{font-size:13px}
  .search-wrap{padding:12px 14px 8px}
  .list{padding:10px 10px 16px}
  .item{padding:12px;border-radius:16px}
  .item-sub{font-size:12px}
  .mini-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .mini{padding:7px 5px}
  .mini-k{font-size:8px}
  .mini-v{font-size:11px}
  .rank-badge{font-size:11px;padding:6px 8px}
  .marker-card{min-width:68px;padding:7px 8px;border-radius:12px}
  .marker-name{font-size:10px}
  .marker-value{font-size:12px}
  .marker-meta{font-size:8px;margin-top:4px}
  .leaflet-control-zoom{margin-top:8px!important;margin-left:8px!important}
  .leaflet-top.leaflet-left{top:6px}
}

@media (max-width:420px){
  #map{height:46vh;min-height:320px}
  .logo{font-size:16px}
  .pill{padding:7px 10px;font-size:11px}
  .selection-card{padding:12px}
  .metric-v{font-size:20px}
}
</style>
</head>

  {id:'harlem', name:'Harlem', borough:'Manhattan', lat:40.8116, lng:-73.9465, rentYoY:6.0, rent30:0.6, transactions:26, avgPsf:688, buyers:19, volume:159, unitsSold:231, valueYoY:5.5, value30:0.5, intents:{buying:16,selling:13,refinancing:10,renovating:12}},
  {id:'ues', name:'Upper East Side', borough:'Manhattan', lat:40.7736, lng:-73.9566, rentYoY:2.4, rent30:0.1, transactions:12, avgPsf:1142, buyers:9, volume:176, unitsSold:67, valueYoY:2.8, value30:0.1, intents:{buying:7,selling:5,refinancing:4,renovating:6}},
  {id:'les', name:'Lower East Side', borough:'Manhattan', lat:40.7150, lng:-73.9843, rentYoY:4.3, rent30:0.3, transactions:15, avgPsf:1018, buyers:11, volume:149, unitsSold:81, valueYoY:3.9, value30:0.2, intents:{buying:8,selling:6,refinancing:4,renovating:6}},
  {id:'southbronx', name:'South Bronx', borough:'Bronx', lat:40.8162, lng:-73.9174, rentYoY:6.7, rent30:0.7, transactions:29, avgPsf:409, buyers:21, volume:137, unitsSold:312, valueYoY:6.1, value30:0.6, intents:{buying:19,selling:17,refinancing:13,renovating:16}},
  {id:'washheights', name:'Washington Heights', borough:'Manhattan', lat:40.8486, lng:-73.9361, rentYoY:5.6, rent30:0.4, transactions:20, avgPsf:471, buyers:15, volume:96, unitsSold:176, valueYoY:4.7, value30:0.3, intents:{buying:12,selling:10,refinancing:7,renovating:10}}
];
let signal='rent', intentFocus='buying', selectedId='williamsburg', map, markersLayer;
const signalMeta={
  rent:{title:'Rent Trend',subtitle:'Year-over-year and trailing 30-day rent movement by submarket.',legend:'Rent Trend Strength',
    value:n=>`${n.rentYoY>=0?'+':''}${n.rentYoY.toFixed(1)}%`,
    subline:n=>`${n.borough} · ${n.rentYoY>=0?'+':''}${n.rentYoY.toFixed(1)}% YoY · ${n.rent30>=0?'+':''}${n.rent30.toFixed(1)}% 30d`,
    score:n=>(n.rentYoY*.82)+(n.rent30*9),
    sideMetrics:n=>[['Rent',`${n.rentYoY>=0?'+':''}${n.rentYoY.toFixed(1)}%`],['Buyer',String(n.transactions)],['Value',`${n.valueYoY>=0?'+':''}${n.valueYoY.toFixed(1)}%`],['Intent',String(n.intents[intentFocus])]]
  },
  activity:{title:'Buyer Activity',subtitle:'Transactions, pricing, buyer depth, volume and units sold by submarket.',legend:'Buyer Activity Strength',
    value:n=>`${n.transactions}`,subline:n=>`${n.borough} · ${n.transactions} sales · $${n.avgPsf}/SF`,
    score:n=>n.transactions*1.55+n.buyers*1.05+(n.unitsSold/24)+(n.volume/12),
    sideMetrics:n=>[['Sales',String(n.transactions)],['$/SF',`$${n.avgPsf}`],['Value',`${n.valueYoY>=0?'+':''}${n.valueYoY.toFixed(1)}%`],['Intent',String(n.intents[intentFocus])]]
  },
  value:{title:'Value Trend',subtitle:'Year-over-year and trailing 30-day value movement by submarket.',legend:'Value Trend Strength',
    value:n=>`${n.valueYoY>=0?'+':''}${n.valueYoY.toFixed(1)}%`,
    subline:n=>`${n.borough} · ${n.valueYoY>=0?'+':''}${n.valueYoY.toFixed(1)}% YoY · ${n.value30>=0?'+':''}${n.value30.toFixed(1)}% 30d`,
    score:n=>(n.valueYoY*.9)+(n.value30*10),
    sideMetrics:n=>[['Value',`${n.valueYoY>=0?'+':''}${n.valueYoY.toFixed(1)}%`],['Buyer',String(n.transactions)],['Rent',`${n.rentYoY>=0?'+':''}${n.rentYoY.toFixed(1)}%`],['Intent',String(n.intents[intentFocus])]]
  },
  intent:{title:'Owner Intent',subtitle:'Count of owners signaling buying, selling, refinancing or renovating by submarket.',legend:'Owner Intent Count',
    value:n=>`${n.intents[intentFocus]}`,subline:n=>`${n.borough} · ${intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1)} intent count`,
    score:n=>n.intents[intentFocus],
    sideMetrics:n=>[['Buy',String(n.intents.buying)],['Sell',String(n.intents.selling)],['Refi',String(n.intents.refinancing)],['Reno',String(n.intents.renovating)]]
  }
};
function colorScale(t){t=Math.max(0,Math.min(1,t));const stops=[[0,[39,68,55]],[.3,[89,139,100]],[.58,[201,168,76]],[.8,[215,125,68]],[1,[180,80,68]]];for(let i=1;i<stops.length;i++){if(t<=stops[i][0]){const[t0,a]=stops[i-1],[t1,b]=stops[i],p=(t-t0)/(t1-t0);return`rgb(${Math.round(a[0]+(b[0]-a[0])*p)},${Math.round(a[1]+(b[1]-a[1])*p)},${Math.round(a[2]+(b[2]-a[2])*p)})`;}}return'rgb(180,80,68)'}
function rankedData(query=''){const q=query.trim().toLowerCase();return [...SUBMARKETS].filter(n=>!q||n.name.toLowerCase().includes(q)||n.borough.toLowerCase().includes(q)).sort((a,b)=>signalMeta[signal].score(b)-signalMeta[signal].score(a))}
function normalizeScores(items){const scores=items.map(n=>signalMeta[signal].score(n)),min=Math.min(...scores),max=Math.max(...scores);return new Map(items.map(n=>[n.id,max===min?.65:(signalMeta[signal].score(n)-min)/(max-min)]))}
function selected(){return SUBMARKETS.find(n=>n.id===selectedId)||SUBMARKETS[0]}
function renderLegend(){document.getElementById('legendTitle').textContent=signalMeta[signal].legend;document.getElementById('legendScale').innerHTML=Array.from({length:24},(_,i)=>`<span style="background:${colorScale(i/23)}"></span>`).join('')}
function renderStats(){
  const items=rankedData('');
  let cards=[];
  if(signal==='rent'){
    const increasing=items.filter(n=>n.rentYoY>0).length,avgYoY=items.reduce((s,n)=>s+n.rentYoY,0)/items.length,avg30=items.reduce((s,n)=>s+n.rent30,0)/items.length,declining=items.filter(n=>n.rentYoY<0).length;
    cards=[[String(increasing),'Increasing'],[`${avgYoY>=0?'+':''}${avgYoY.toFixed(1)}%`,'Avg YoY'],[`${avg30>=0?'+':''}${avg30.toFixed(1)}%`,'Avg 30 Day'],[String(declining),'Declining']];
  }else if(signal==='activity'){
    const tx=items.reduce((s,n)=>s+n.transactions,0),avg=Math.round(items.reduce((s,n)=>s+n.avgPsf,0)/items.length),buyers=items.reduce((s,n)=>s+n.buyers,0),units=items.reduce((s,n)=>s+n.unitsSold,0);
    cards=[[String(tx),'Transactions'],[`$${avg}`,'Avg Price / SF'],[String(buyers),'Different Buyers'],[String(units),'Units Sold']];
  }else if(signal==='value'){
    const increasing=items.filter(n=>n.valueYoY>0).length,avgYoY=items.reduce((s,n)=>s+n.valueYoY,0)/items.length,avg30=items.reduce((s,n)=>s+n.value30,0)/items.length,declining=items.filter(n=>n.valueYoY<0).length;
    cards=[[String(increasing),'Increasing'],[`+${avgYoY.toFixed(1)}%`,'Avg YoY'],[`+${avg30.toFixed(1)}%`,'Avg 30 Day'],[String(declining),'Declining']];
  }else{
    const total=items.reduce((s,n)=>s+n.intents[intentFocus],0);
    const avg=total/items.length;
    const top=items[0];
    const concentration = top ? ((top.intents[intentFocus]/total)*100) : 0;
    cards=[[String(total),`${intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1)} Signals`],[top.name,'Top Submarket'],[avg.toFixed(1),'Avg / Market'],[`${concentration.toFixed(0)}%`,'Top Share']];
  }
  document.getElementById('statStrip').innerHTML=cards.map(([v,l])=>`<div class="stat"><div class="stat-value">${v}</div><div class="stat-label">${l}</div></div>`).join('');
}
function renderSelectionCard(){
  const n=selected();
  const intentChips=['buying','selling','refinancing','renovating'].map(k=>`<div class="intent-chip ${intentFocus===k?'active':''}">${k.charAt(0).toUpperCase()+k.slice(1)} ${n.intents[k]}</div>`).join('');
  const intentHighlight = `<div class="intent-highlight"><div class="intent-highlight-k">${intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1)} Intent Count</div><div class="intent-highlight-v">${n.intents[intentFocus]}</div></div>`;
  document.getElementById('selectionCard').innerHTML=
    `<div class="eyebrow">Selected Submarket</div>
     <h3 class="selection-title">${n.name}</h3>
     <div class="selection-sub">${n.borough} · signal view: ${signalMeta[signal].title}${signal==='intent'?` · ${intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1)}`:''}</div>
     ${intentHighlight}
     <div class="intent-chip-row">${intentChips}</div>
     <div class="metric-grid">
      <div class="metric-box"><div class="metric-k">Rent YoY</div><div class="metric-v">${n.rentYoY>=0?'+':''}${n.rentYoY.toFixed(1)}%</div></div>
      <div class="metric-box"><div class="metric-k">30 Day Rent</div><div class="metric-v">${n.rent30>=0?'+':''}${n.rent30.toFixed(1)}%</div></div>
      <div class="metric-box"><div class="metric-k">Transactions</div><div class="metric-v">${n.transactions}</div></div>
      <div class="metric-box"><div class="metric-k">Avg Price / SF</div><div class="metric-v">$${n.avgPsf}</div></div>
     </div>
     <div class="detail-list">
      <div class="k">Total Sales Volume</div><div class="v">$${n.volume}M</div>
      <div class="k">Different Buyers</div><div class="v">${n.buyers}</div>
      <div class="k">Units Sold</div><div class="v">${n.unitsSold}</div>
      <div class="k">Value Trend YoY</div><div class="v">${n.valueYoY>=0?'+':''}${n.valueYoY.toFixed(1)}%</div>
      <div class="k">Value Trend 30 Day</div><div class="v">${n.value30>=0?'+':''}${n.value30.toFixed(1)}%</div>
      <div class="k">Buying / Selling</div><div class="v">${n.intents.buying} / ${n.intents.selling}</div>
      <div class="k">Refi / Renovating</div><div class="v">${n.intents.refinancing} / ${n.intents.renovating}</div>
     </div>`;
}
function markerHtml(n,intensity,active){const color=colorScale(intensity),value=signalMeta[signal].value(n),meta=signal==='activity' ? `$${n.avgPsf}/SF` : signal==='intent' ? intentFocus.charAt(0).toUpperCase()+intentFocus.slice(1) : n.borough;return `<div class="marker-card ${active?'active':''}" style="border-color:${active?'rgba(255,255,255,.28)':'rgba(255,255,255,.08)'};background:linear-gradient(180deg,rgba(17,20,18,.95),rgba(13,16,14,.9));"><div class="marker-name">${n.name}</div><div class="marker-value" style="color:${color}">${value}</div><div class="marker-meta">${meta}</div><div class="marker-pointer" style="background:rgba(14,17,15,.92)"></div></div>`}
function popupHtml(n){return `<div class="map-popup-title">${n.name}</div><div class="map-popup-sub">${n.borough}</div><div class="map-popup-grid"><div><b>Rent YoY</b>${n.rentYoY>=0?'+':''}${n.rentYoY.toFixed(1)}%</div><div><b>30 Day Rent</b>${n.rent30>=0?'+':''}${n.rent30.toFixed(1)}%</div><div><b>Transactions</b>${n.transactions}</div><div><b>Avg Price / SF</b>$${n.avgPsf}</div><div><b>Value YoY</b>${n.valueYoY>=0?'+':''}${n.valueYoY.toFixed(1)}%</div><div><b>Units Sold</b>${n.unitsSold}</div></div>`}
function renderMarkers(){const items=rankedData(''),normalized=normalizeScores(items);markersLayer.clearLayers();items.forEach(n=>{const size=84+(normalized.get(n.id)*12);const icon=L.divIcon({className:'submarket-marker',html:markerHtml(n,normalized.get(n.id),n.id===selectedId),iconSize:[size,52],iconAnchor:[size/2,26]});const marker=L.marker([n.lat,n.lng],{icon,keyboard:false,riseOnHover:true}).addTo(markersLayer);marker.bindPopup(popupHtml(n),{offset:[0,-8],closeButton:false});marker.on('mouseover',()=>marker.openPopup());marker.on('mouseout',()=>marker.closePopup());marker.on('click',()=>{selectedId=n.id;renderAll()})})}
function renderList(){const q=document.getElementById('searchInput').value||'',items=rankedData(q),normalized=normalizeScores(rankedData(''));document.getElementById('sidebarTitle').textContent=signalMeta[signal].title;document.getElementById('sidebarSub').textContent=signalMeta[signal].subtitle;document.getElementById('rankingList').innerHTML=items.map(n=>{const metrics=signalMeta[signal].sideMetrics(n);return `<div class="item ${n.id===selectedId?'active':''}" data-id="${n.id}"><div><div class="item-title">${n.name}</div><div class="item-sub">${signalMeta[signal].subline(n)}</div><div class="mini-grid">${metrics.map(([k,v])=>`<div class="mini"><div class="mini-k">${k}</div><div class="mini-v">${v}</div></div>`).join('')}</div></div><div class="rank-badge">${Math.round(normalized.get(n.id)*100)}</div></div>`}).join('');document.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>{selectedId=el.dataset.id;const n=selected();map.flyTo([n.lat,n.lng],Math.max(map.getZoom(),12),{duration:.6});renderAll()}))}
function renderAll(){renderLegend();renderStats();renderSelectionCard();renderMarkers();renderList()}
function initMap(){map=L.map('map',{zoomControl:true,attributionControl:true,center:[40.724,-73.944],zoom:11,minZoom:10,maxZoom:14,scrollWheelZoom:true,preferCanvas:true});const bounds=L.latLngBounds([[40.54,-74.25],[40.93,-73.68]]);map.setMaxBounds(bounds.pad(.15));L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);markersLayer=L.layerGroup().addTo(map);renderAll()}
document.querySelectorAll('.signal-pill').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.signal-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');signal=btn.dataset.signal;renderAll()}))
document.querySelectorAll('.intent-pill').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.intent-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  intentFocus=btn.dataset.intent;
  document.querySelectorAll('.signal-pill').forEach(b=>b.classList.remove('active'));
  const intentSignalBtn = document.querySelector('.signal-pill[data-signal="intent"]');
  if(intentSignalBtn){ intentSignalBtn.classList.add('active'); }
  signal='intent';
  renderAll();
}))
document.getElementById('searchInput').addEventListener('input',renderList)
initMap();
</script>
</body>
